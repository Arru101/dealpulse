version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@affiliateplatform.in}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkeyforaffiliateplatform123!}
      - JWT_EXPIRES_IN=7d
      - FIREBASE_DATABASE_URL=${FIREBASE_DATABASE_URL:-https://affilate-amz-default-rtdb.firebaseio.com}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-affilate-amz}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - AMAZON_PARTNER_TAG=${AMAZON_PARTNER_TAG}
      - AMAZON_ACCESS_KEY=${AMAZON_ACCESS_KEY}
      - AMAZON_SECRET_KEY=${AMAZON_SECRET_KEY}
      - AMAZON_HOST=${AMAZON_HOST:-webservices.amazon.in}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - backend-data:/usr/src/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY:-AIzaSyB0YcCI-dWk7NRVwTosAiTZzDV-8Q7wQeU}
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:5000}
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - backend
    restart: always

volumes:
  backend-data:
